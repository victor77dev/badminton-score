<html>
    <head>
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta name="mobile-web-app-capable" content="yes">
        <meta name="apple-mobile-web-app-capable" content="yes">
        <link rel="stylesheet" type="text/css" href="styles/index.css" />
        <link rel="manifest" href="manifest.json" />
        <script type="module" src="app.js"></script>
        <script>
            if (!navigator.serviceWorker.controller) {
                navigator.serviceWorker.register("sw.js").then(function(reg) {
                    console.log("Service worker has been registered for scope: " + reg.scope);
                });
            }
        </script>
    </head>
    <body>
        <div id="app">
            <button class="add" id="left-add">+ 1</button>
            <button class="add" id="right-add">+ 1</button>
            <div id="court">
                <div class="court-half" id="left">
                    <div class="court-one-fourth" id="left-left"></div>
                    <div class="court-one-fourth" id="left-right"></div>
                </div>
                <div class="court-half" id="right">
                    <div class="court-one-fourth" id="right-left"></div>
                    <div class="court-one-fourth" id="right-right"></div>
                </div>
            </div>
        </div>
    </body>
</html>
